main.name = "Pwnagotchi"    # change my name
main.lang = "en"
main.confd = "/etc/pwnagotchi/conf.d/"
main.custom_plugins = ""
main.custom_plugin_repos = [
  "https://github.com/evilsocket/pwnagotchi-plugins-contrib/archive/master.zip"
]
main.iface = "mon0"                               # if using a supported usb wifi dongle change to wlan1
main.mon_start_cmd = "/usr/bin/monstart"
main.mon_stop_cmd = "/usr/bin/monstop"
main.mon_max_blind_epochs = 5
main.no_restart = false
main.whitelist = ['home-wifi-name', 'example2',]  # cannot see or interact with theses wifi names. if ai is enabled, seeing one of these also pauses ai (see personality.home_absent_epochs)
main.filter = ""

[main.log]
debug = false
path = "/var/log/pwnagotchi.log"

[main.log.rotation]
enabled = true
size = "10M"

[main.plugins.automatic-updates]
enabled = true
repo = "ex18a/pwnagotchi64"
interval = 6                  # how often to check in hours
install = true                # set false if you just want the "update available" status message

[main.plugins.grid]
enabled = true
report = true

[main.plugins.watchdog]       # reboots device if detected hardware fail
enabled = true

[main.plugins.portrait-mode]
enabled = true

[main.plugins.IPDisplay]
enabled = true

[main.plugins.hashvault]
enabled = true

[main.plugins.dev-ai-trained]  # shows how long ai has trained as AGE
enabled = true

[main.plugins.pisugar3i2c]
enabled = true

[main.plugins.face_only]
enabled = false

[main.plugins.wpa-sec]
enabled = false
api_key = ""
api_url = "https://wpa-sec.stanev.org"
download_results = true    #saves file inside handshakes folder
download_interval = 3600
whitelist = []

[main.plugins.memtemp]
enabled = true
scale = "celsius"
orientation = "horizontal"

[ai]
enabled = true            # true lets ai tune personality through trial and error
path = "/root/brain.nn"
laziness = 0.2
epochs_per_episode = 10

[ai.params]
gamma = 0.99
n_steps = 1
vf_coef = 0.25
ent_coef = 0.01
max_grad_norm = 0.5
learning_rate = 0.001
rms_prop_eps = 0.00001
verbose = 1

[personality]
advertise = false              # can other pwnagotchi see me
deauth = true                  # allowed to deauth
associate = true               # allowed to associate
channels = []                  # channels to look at - [] is all
min_rssi = -75                 # range of scanning. -50 is very near -200 very far
ap_ttl = 240                   # how long to keep a wifi in scan list
sta_ttl = 300                  # how long to keep a client in scan list
recon_time = 150               # how long to scan for wifi networks
max_inactive_scale = 3
recon_inactive_multiplier = 2
hop_recon_time = 30            # how long to wait on channel for handshakes
min_recon_time = 15
max_interactions = 4           # how many times allowed to attack same wifi before giving up
max_misses_for_recon = 6
excited_num_epochs = 3
bored_num_epochs = 4
sad_num_epochs = 6
bond_encounters_factor = 20000
home_absent_epochs = 5         # epochs a whitelisted AP must be gone before AI is eligible to resume

[ui]
fps = 0.0
cursor = true                  # blink the cursor after the name -- independent of fps, safe to leave on for e-ink
cursor_interval = 3            # seconds between blinks

[ui.font]
name = "DejaVuSansMono"  # for japanese: fonts-japanese-gothic
size_offset = 0          # will be added to the font size

[ui.faces]
look_r = ["( ⚆_⚆)", "( ◕_◕)"]
look_l = ["(☉_☉ )", "(◕_◕ )"]
look_r_happy = ["( ◕‿◕)", "( ≧◡≦)"]
look_l_happy = ["(◕‿◕ )", "(≧◡≦ )"]
sleep = "(⇀‿‿↼)"
sleep2 = ["(≖‿‿≖)", "(≖__≖)", "(u__u)", "(-__-)", "(z__z)", "(◡__◡)"]
awake = "(◕‿‿◕)"
bored = "(-__-)"
intense = ["(°▃▃°)", "( ◣_◢)"]
cool = ["(⌐■_■)", "(♥‿‿♥)"]
happy = ["(•‿‿•)", "(^‿‿^)", "(^◡◡^)"]
excited = ["(ᵔ◡◡ᵔ)", "(✜‿‿✜)"]
grateful = "(^‿‿^)"
motivated = "(☼‿‿☼)"
demotivated = "(≖__≖)"
smart = "(✜‿‿✜)"
lonely = "(ب__ب)"
sad = "(╥☁╥ )"
angry = "(-_-')"
friend = ["(♥‿‿♥)", "(♡‿‿♡)", "(♥‿♥ )", "(♥ω♥ )"]
broken = "(☓‿‿☓)"
debug = "(#__#)"
upload = "(1__0)"
upload1 = "(1__1)"
upload2 = "(0__1)"

[ui.web]
enabled = true
address = "0.0.0.0"
auth = false
username = "pwnagotchi"
password = "pwnagotchi"
origin = ""
port = 8080
on_frame = ""

[ui.display]
enabled = true
rotation = 180
type = "waveshare_4"
color = "black"

[bettercap]
scheme = "http"
hostname = "localhost"
port = 8081
username = "pwnagotchi"
password = "pwnagotchi"
handshakes = "/home/pwn/handshakes"
silence = [
  "ble.device.new",
  "ble.device.lost",
  "ble.device.disconnected",
  "ble.device.connected",
  "ble.device.service.discovered",
  "ble.device.characteristic.discovered",
  "wifi.client.new",
  "wifi.client.lost",
  "wifi.client.probe",
  "wifi.ap.new",
  "wifi.ap.lost",
  "mod.started"
]

[fs.memory]
enabled = false

[fs.memory.mounts.log]
enabled = false
mount = "/var/log"
size = "50M"
sync = 60
zram = true
rsync = true

[fs.memory.mounts.data]
enabled = false
mount = "/var/tmp/pwnagotchi"
size = "10M"
sync = 3600
zram = false
rsync = true
